<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บัญชีรายปี Pro Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen py-10">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-6 space-y-6">
        <h1 class="text-2xl font-bold text-center text-slate-800">📊 บัญชีรายปี 2026</h1>

        <select id="month-selector" onchange="loadData()" class="w-full p-2 border border-gray-300 rounded-lg font-bold text-center bg-white">
            <option value="0">มกราคม</option><option value="1">กุมภาพันธ์</option>
            <option value="2">มีนาคม</option><option value="3">เมษายน</option>
            <option value="4">พฤษภาคม</option><option value="5">มิถุนายน</option>
            <option value="6">กรกฎาคม</option><option value="7">สิงหาคม</option>
            <option value="8">กันยายน</option><option value="9">ตุลาคม</option>
            <option value="10">พฤศจิกายน</option><option value="11">ธันวาคม</option>
        </select>

        <div class="space-y-2">
            <div class="flex justify-between text-xs text-slate-500">
                <span>การใช้งานงบประมาณ</span>
                <span id="budget-percent">0%</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-4 overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-500 w-[0%] transition-all"></div>
            </div>
        </div>

        <form id="transaction-form" class="space-y-2 bg-slate-50 p-4 rounded-xl border">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="text" placeholder="รายการ (เช่น ข้าว)" required class="text-sm p-2 border rounded w-full">
                <select id="category" class="text-sm p-2 border rounded">
                    <option value="อาหาร">อาหาร</option>
                    <option value="เดินทาง">เดินทาง</option>
                    <option value="ช้อปปิ้ง">ช้อปปิ้ง</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
            </div>
            <input type="number" id="amount" placeholder="จำนวนเงิน" required class="w-full text-sm p-2 border rounded">
            <div class="flex gap-2">
                <button type="button" onclick="addTransaction('income')" class="w-full bg-emerald-500 text-white py-2 rounded text-sm font-bold">รับ</button>
                <button type="button" onclick="addTransaction('expense')" class="w-full bg-rose-500 text-white py-2 rounded text-sm font-bold">จ่าย</button>
            </div>
        </form>

        <ul id="list" class="space-y-2 max-h-60 overflow-y-auto"></ul>

        <div class="flex gap-2 pt-4 border-t">
            <button onclick="exportData()" class="flex-1 text-xs bg-slate-200 py-2 rounded">สำรองข้อมูล (JSON)</button>
            <button onclick="clearData()" class="flex-1 text-xs bg-rose-100 text-rose-600 py-2 rounded">ล้างข้อมูลเดือนนี้</button>
        </div>
    </div>

    <script>
        const monthSelector = document.getElementById('month-selector');
        monthSelector.value = new Date().getMonth();

        function getStorageKey() { return `data_2026_${monthSelector.value}`; }

        function loadData() {
            const key = getStorageKey();
            const data = JSON.parse(localStorage.getItem(key)) || { salary: 0, budget: 10000, transactions: [] };
            render(data);
        }

        function addTransaction(type) {
            const key = getStorageKey();
            let data = JSON.parse(localStorage.getItem(key)) || { salary: 0, budget: 10000, transactions: [] };
            data.transactions.push({
                text: document.getElementById('text').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                type: type,
                date: new Date().toLocaleDateString('th-TH')
            });
            localStorage.setItem(key, JSON.stringify(data));
            document.getElementById('text').value = '';
            document.getElementById('amount').value = '';
            loadData();
        }

        function deleteTransaction(index) {
            const key = getStorageKey();
            let data = JSON.parse(localStorage.getItem(key));
            data.transactions.splice(index, 1);
            localStorage.setItem(key, JSON.stringify(data));
            loadData();
        }

        // ระบบสำรองข้อมูล
        function exportData() {
            const dataStr = localStorage.getItem(getStorageKey());
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_month_${monthSelector.value}.json`;
            a.click();
        }

        // ระบบล้างข้อมูล
        function clearData() {
            if(confirm('คุณต้องการลบข้อมูลทั้งหมดในเดือนนี้ใช่หรือไม่?')) {
                localStorage.removeItem(getStorageKey());
                loadData();
            }
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            let totalExpense = 0;

            data.transactions.forEach((t, i) => {
                if(t.type === 'expense') totalExpense += t.amount;
                list.innerHTML += `<li class="p-2 border-b text-sm flex justify-between items-center">
                    <div><b>${t.text}</b> <span class="text-[10px] bg-slate-100 px-1 rounded">${t.category}</span></div>
                    <div class="flex items-center gap-2">
                        <span class="${t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'} font-bold">
                            ${t.type === 'income' ? '+' : '-'}฿${t.amount}
                        </span>
                        <button onclick="deleteTransaction(${i})" class="text-rose-300 hover:text-rose-600">✕</button>
                    </div>
                </li>`;
            });

            // อัปเดต Progress Bar
            const percent = (totalExpense / data.budget) * 100;
            document.getElementById('progress-bar').style.width = Math.min(percent, 100) + '%';
            document.getElementById('budget-percent').innerText = Math.round(percent) + '%';
        }

        loadData();
    </script>
</body>
</html>
