<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บัญชีรายปี</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: 'Sarabun', system-ui, sans-serif;
  --bg: #F0F4FF;
  --surface-0: #F0F4FF;
  --surface-1: #F8F9FF;
  --surface-2: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-muted: #94A3B8;
  --fill-accent: #4F46E5;
  --bg-accent: #EEF2FF;
  --border-accent: #C7D2FE;
  --text-accent: #4338CA;
  --fill-success: #059669;
  --bg-success: #F0FDF4;
  --border-success: #A7F3D0;
  --text-success: #047857;
  --on-success: #FFFFFF;
  --fill-danger: #DC2626;
  --bg-danger: #FFF1F2;
  --border-danger: #FECDD3;
  --text-danger: #BE123C;
  --on-danger: #FFFFFF;
  --fill-warning: #D97706;
  --bg-warning: #FFFBEB;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0F172A;
    --surface-0: #0F172A;
    --surface-1: #1E293B;
    --surface-2: #293548;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --fill-accent: #6366F1;
    --bg-accent: #1E1B4B;
    --border-accent: #3730A3;
    --text-accent: #818CF8;
    --fill-success: #10B981;
    --bg-success: #022C22;
    --border-success: #064E3B;
    --text-success: #34D399;
    --on-success: #022C22;
    --fill-danger: #EF4444;
    --bg-danger: #2D0A0A;
    --border-danger: #7F1D1D;
    --text-danger: #F87171;
    --on-danger: #2D0A0A;
    --fill-warning: #F59E0B;
    --bg-warning: #2D1700;
  }
}
body {
  font-family: var(--font);
  background: var(--bg);
  min-height: 100vh;
  padding: 24px 16px 48px;
  color: var(--text-primary);
}
.app {
  max-width: 420px;
  margin: 0 auto;
  background: var(--surface-2);
  border: 0.5px solid var(--border-strong);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
}
/* ─── Header ─── */
.hd {
  background: var(--surface-1);
  border-bottom: 0.5px solid var(--border);
  padding: 1.1rem 1.25rem;
}
.hd-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 0.75rem;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.year-nav {
  display: flex;
  align-items: center;
  gap: 4px;
}
.year-btn {
  border: 0.5px solid var(--border-strong);
  background: var(--surface-2);
  color: var(--text-secondary);
  border-radius: 8px;
  width: 26px;
  height: 26px;
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  line-height: 1;
}
.year-btn:hover { background: var(--bg-accent); color: var(--text-accent); }
.year-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); min-width: 40px; text-align: center; }
.period-row { display: flex; gap: 8px; }
#month-selector {
  flex: 1;
  padding: 9px 14px;
  background: var(--surface-2);
  border: 0.5px solid var(--border-strong);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  -webkit-appearance: none;
  appearance: none;
}
/* ─── Ring Hero ─── */
.hero {
  padding: 1.4rem 1.25rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 0.5px solid var(--border);
}
.ring-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  margin-bottom: 1.1rem;
}
.ring-svg {
  width: 140px;
  height: 140px;
  transform: rotate(-90deg);
}
#ring-track { fill: none; stroke: var(--border-strong); stroke-width: 10; }
#ring-arc {
  fill: none;
  stroke: var(--fill-accent);
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.75s cubic-bezier(.4,0,.2,1), stroke 0.3s;
}
#ring-arc.warn { stroke: var(--fill-warning); }
#ring-arc.over { stroke: var(--fill-danger); }
.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ring-big {
  font-size: 30px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.ring-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
  font-weight: 400;
}
/* ─── Stats ─── */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
}
.sc { border-radius: 12px; padding: 11px 8px; text-align: center; }
.sc.inc { background: var(--bg-success); border: 0.5px solid var(--border-success); }
.sc.bal { background: var(--bg-accent); border: 0.5px solid var(--border-accent); }
.sc.exp { background: var(--bg-danger); border: 0.5px solid var(--border-danger); }
.sc-lbl { font-size: 11px; font-weight: 500; letter-spacing: .04em; margin-bottom: 4px; }
.inc .sc-lbl { color: var(--text-success); }
.bal .sc-lbl { color: var(--text-accent); }
.exp .sc-lbl { color: var(--text-danger); }
.sc-val { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.inc .sc-val { color: var(--text-success); }
.bal .sc-val { color: var(--text-accent); }
.exp .sc-val { color: var(--text-danger); }
/* ─── Budget Bar ─── */
.bar-sec {
  padding: .8rem 1.25rem .6rem;
  border-bottom: 0.5px solid var(--border);
}
.bar-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.bar-meta-left { display: flex; align-items: center; gap: 6px; }
#budget-percent { color: var(--text-accent); font-weight: 700; }
.edit-budget-btn {
  border: none;
  background: none;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  text-decoration: underline;
  font-family: var(--font);
  padding: 0;
}
.edit-budget-btn:hover { color: var(--text-accent); }
.prog-track {
  background: var(--surface-1);
  border: 0.5px solid var(--border);
  border-radius: 99px;
  height: 6px;
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  background: var(--fill-accent);
  border-radius: 99px;
  width: 0%;
  transition: width 0.65s cubic-bezier(.4,0,.2,1), background 0.3s;
}
/* ─── Category breakdown ─── */
.cat-sec {
  padding: .7rem 1.25rem .2rem;
  border-bottom: 0.5px solid var(--border);
}
.cat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
  font-size: 11px;
}
.cat-row:last-child { margin-bottom: 4px; }
.cat-ico { flex-shrink: 0; }
.cat-name { flex-shrink: 0; width: 62px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-track { flex: 1; height: 6px; background: var(--surface-1); border-radius: 99px; overflow: hidden; }
.cat-fill { height: 100%; background: var(--fill-accent); border-radius: 99px; transition: width .5s; }
.cat-amt { flex-shrink: 0; width: 62px; text-align: right; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.cat-empty { font-size: 11px; color: var(--text-muted); padding: 4px 0 8px; text-align: center; }
/* ─── Form ─── */
.form-sec { padding: .8rem 1.25rem .6rem; }
#transaction-form {
  background: var(--surface-1);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 13px;
}
.edit-banner {
  display: none;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-accent);
  border: 0.5px solid var(--border-accent);
  color: var(--text-accent);
  font-size: 11px;
  font-weight: 600;
  border-radius: 8px;
  padding: 6px 10px;
  margin-bottom: 8px;
}
.edit-banner.show { display: flex; }
.edit-banner button {
  border: none;
  background: none;
  color: var(--text-accent);
  font-size: 11px;
  font-family: var(--font);
  cursor: pointer;
  text-decoration: underline;
}
.f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.finp {
  border: 0.5px solid var(--border-strong);
  border-radius: 10px;
  padding: 9px 11px;
  font-size: 13px;
  width: 100%;
  font-family: var(--font);
  background: var(--surface-2);
  color: var(--text-primary);
  transition: border-color .15s, box-shadow .15s;
}
.finp:focus {
  outline: none;
  border-color: var(--border-accent);
  box-shadow: 0 0 0 3px var(--bg-accent);
}
.finp::placeholder { color: var(--text-muted); }
.mb8 { margin-bottom: 8px; }
.btn-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btx {
  border-radius: 10px;
  padding: 10px 0;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  border: none;
}
.btx:active { transform: scale(.97); }
.btx.inc-btn { background: var(--fill-success); color: #fff; }
.btx.inc-btn:hover { opacity: .88; }
.btx.exp-btn { background: var(--fill-danger); color: #fff; }
.btx.exp-btn:hover { opacity: .88; }
.btx.update-btn { background: var(--fill-accent); color: #fff; grid-column: 1 / -1; }
.btx.update-btn:hover { opacity: .88; }
/* ─── List ─── */
.list-sec { padding: .5rem 1.25rem .8rem; }
.list-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 9px;
}
#tx-count { font-weight: 400; text-transform: none; letter-spacing: normal; }
#list {
  list-style: none;
  max-height: 240px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.tx-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 11px;
  border-radius: 11px;
  margin-bottom: 6px;
  background: var(--surface-1);
  border: 0.5px solid var(--border);
  transition: background .12s, border-color .12s;
  cursor: pointer;
}
.tx-row:last-child { margin-bottom: 0; }
.tx-row:hover { background: var(--bg-accent); border-color: var(--border-accent); }
.tx-info { flex: 1; min-width: 0; }
.tx-top { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.tx-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tx-badge {
  font-size: 10px;
  background: var(--surface-0);
  border: 0.5px solid var(--border);
  color: var(--text-secondary);
  padding: 1px 7px;
  border-radius: 99px;
  font-weight: 400;
  flex-shrink: 0;
}
.tx-date { font-size: 10px; color: var(--text-muted); }
.tx-side { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: 10px; }
.tx-amt { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.tx-amt.inc { color: var(--text-success); }
.tx-amt.exp { color: var(--text-danger); }
.del-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 6px;
  transition: color .12s, background .12s;
  line-height: 1;
  font-family: sans-serif;
}
.del-btn:hover { color: var(--text-danger); background: var(--bg-danger); }
.empty-li { text-align: center; padding: 2rem 0; }
.empty-icon { font-size: 32px; margin-bottom: 8px; display: block; }
.empty-txt { font-size: 12px; color: var(--text-muted); font-weight: 400; }
/* ─── Footer ─── */
.foot-sec { padding: .5rem 1.25rem 1.1rem; border-top: 0.5px solid var(--border); }
.foot-row { display: flex; gap: 8px; }
.bfoot {
  flex: 1;
  border-radius: 10px;
  padding: 9px 0;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  border: 0.5px solid var(--border-strong);
  background: var(--surface-1);
  color: var(--text-secondary);
  transition: background .12s;
}
.bfoot:hover { background: var(--surface-0); }
.bfoot.clear {
  border-color: var(--border-danger);
  color: var(--text-danger);
  background: var(--bg-danger);
}
.bfoot.clear:hover { background: var(--fill-danger); color: #fff; }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="hd">
    <div class="hd-title">
      <span>📊 บัญชีรายปี</span>
      <div class="year-nav">
        <button type="button" class="year-btn" onclick="changeYear(-1)" aria-label="ปีก่อนหน้า">‹</button>
        <span class="year-label" id="year-label"></span>
        <button type="button" class="year-btn" onclick="changeYear(1)" aria-label="ปีถัดไป">›</button>
      </div>
    </div>
    <div class="period-row">
      <select id="month-selector" onchange="loadData()">
        <option value="0">มกราคม</option><option value="1">กุมภาพันธ์</option>
        <option value="2">มีนาคม</option><option value="3">เมษายน</option>
        <option value="4">พฤษภาคม</option><option value="5">มิถุนายน</option>
        <option value="6">กรกฎาคม</option><option value="7">สิงหาคม</option>
        <option value="8">กันยายน</option><option value="9">ตุลาคม</option>
        <option value="10">พฤศจิกายน</option><option value="11">ธันวาคม</option>
      </select>
    </div>
  </header>

  <!-- Ring Hero + Stats -->
  <section class="hero">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
        <circle id="ring-track" cx="70" cy="70" r="56"/>
        <circle id="ring-arc" cx="70" cy="70" r="56"
                stroke-dasharray="351.86" stroke-dashoffset="351.86"/>
      </svg>
      <div class="ring-center">
        <span class="ring-big" id="ring-pct-display">0%</span>
        <span class="ring-sub">งบที่ใช้</span>
      </div>
    </div>
    <div class="stats">
      <div class="sc inc"><div class="sc-lbl">รายรับ</div><div class="sc-val" id="stat-income">฿0</div></div>
      <div class="sc bal"><div class="sc-lbl">คงเหลือ</div><div class="sc-val" id="stat-balance">฿0</div></div>
      <div class="sc exp"><div class="sc-lbl">รายจ่าย</div><div class="sc-val" id="stat-expense">฿0</div></div>
    </div>
  </section>

  <!-- Budget Bar -->
  <div class="bar-sec">
    <div class="bar-meta">
      <div class="bar-meta-left">
        <span>งบประมาณ (= รายรับ)</span>
      </div>
      <span id="budget-percent">0%</span>
    </div>
    <div class="prog-track">
      <div id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Category breakdown -->
  <div class="cat-sec" id="cat-breakdown"></div>

  <!-- Form -->
  <div class="form-sec">
    <form id="transaction-form">
      <div class="edit-banner" id="edit-banner">
        <span>กำลังแก้ไขรายการ</span>
        <button type="button" onclick="cancelEdit()">ยกเลิก</button>
      </div>
      <div class="f2">
        <input type="text" id="text" placeholder="รายการ (เช่น ข้าว)" required class="finp">
        <select id="category" class="finp">
          <option value="อาหาร">🍜 อาหาร</option>
          <option value="เดินทาง">🚗 เดินทาง</option>
          <option value="ช้อปปิ้ง">🛍️ ช้อปปิ้ง</option>
          <option value="อื่นๆ">📦 อื่นๆ</option>
        </select>
      </div>
      <input type="number" id="amount" placeholder="จำนวนเงิน (บาท)" required min="0.01" step="any" class="finp mb8">
      <div class="btn-pair" id="action-buttons">
        <button type="button" onclick="addTransaction('income')" class="btx inc-btn">+ รับเงิน</button>
        <button type="button" onclick="addTransaction('expense')" class="btx exp-btn">− จ่ายเงิน</button>
      </div>
    </form>
  </div>

  <!-- Transaction List -->
  <div class="list-sec">
    <div class="list-hd">
      <span>รายการธุรกรรม</span>
      <span id="tx-count"></span>
    </div>
    <ul id="list"></ul>
  </div>

  <!-- Footer -->
  <div class="foot-sec">
    <div class="foot-row">
      <button onclick="exportData()" class="bfoot">💾 สำรอง</button>
      <button onclick="triggerImport()" class="bfoot">📥 นำเข้า</button>
      <button onclick="clearData()" class="bfoot clear">🗑 ล้าง</button>
    </div>
    <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(event)">
  </div>
</div>

<script>
// r=56 → CIRC = 2π×56 = 351.86
const CIRC = 2 * Math.PI * 56;
const CAT_ICO = { 'อาหาร':'🍜','เดินทาง':'🚗','ช้อปปิ้ง':'🛍️','อื่นๆ':'📦' };

const monthSelector = document.getElementById('month-selector');
monthSelector.value = new Date().getMonth();
let currentYear = new Date().getFullYear();
let editIndex = null; // index of transaction currently being edited, or null

function getStorageKey(year = currentYear) {
  return `data_${year}_${monthSelector.value}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function changeYear(delta) {
  currentYear += delta;
  cancelEdit();
  loadData();
}

function loadData() {
  document.getElementById('year-label').textContent = currentYear;
  const data = JSON.parse(localStorage.getItem(getStorageKey())) || { transactions: [] };
  render(data);
}

function readCurrentData() {
  return JSON.parse(localStorage.getItem(getStorageKey())) || { transactions: [] };
}

function saveCurrentData(data) {
  localStorage.setItem(getStorageKey(), JSON.stringify(data));
}

function addTransaction(type) {
  // The buttons that call this are type="button" (not type="submit"), so the
  // browser's native `required` validation on #text/#amount never fires.
  // Validate here instead, or a blank amount saves as NaN -> JSON.stringify
  // turns it into null -> render() later crashes on null.toLocaleString().
  const textEl = document.getElementById('text');
  const amountEl = document.getElementById('amount');
  const text = textEl.value.trim();
  const amount = parseFloat(amountEl.value);

  if (!text) {
    alert('กรุณากรอกรายการ');
    textEl.focus();
    return;
  }
  if (!Number.isFinite(amount) || amount <= 0) {
    alert('กรุณากรอกจำนวนเงินให้ถูกต้อง (มากกว่า 0)');
    amountEl.focus();
    return;
  }

  const data = readCurrentData();
  data.transactions.push({
    text,
    category: document.getElementById('category').value,
    amount,
    type,
    date: new Date().toLocaleDateString('th-TH')
  });
  saveCurrentData(data);
  textEl.value = '';
  amountEl.value = '';
  loadData();
}

function startEdit(index) {
  const data = readCurrentData();
  const t = data.transactions[index];
  if (!t) return;
  editIndex = index;
  document.getElementById('text').value = t.text;
  document.getElementById('category').value = t.category;
  document.getElementById('amount').value = t.amount;
  document.getElementById('edit-banner').classList.add('show');
  document.getElementById('action-buttons').innerHTML =
    '<button type="button" onclick="saveEdit(\'' + t.type + '\')" class="btx update-btn">✓ บันทึกการแก้ไข</button>';
  document.getElementById('text').focus();
  window.scrollTo({ top: document.getElementById('transaction-form').offsetTop, behavior: 'smooth' });
}

function cancelEdit() {
  editIndex = null;
  document.getElementById('text').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('edit-banner').classList.remove('show');
  document.getElementById('action-buttons').innerHTML =
    '<button type="button" onclick="addTransaction(\'income\')" class="btx inc-btn">+ รับเงิน</button>' +
    '<button type="button" onclick="addTransaction(\'expense\')" class="btx exp-btn">− จ่ายเงิน</button>';
}

function saveEdit(type) {
  if (editIndex === null) return;
  const textEl = document.getElementById('text');
  const amountEl = document.getElementById('amount');
  const text = textEl.value.trim();
  const amount = parseFloat(amountEl.value);

  if (!text) {
    alert('กรุณากรอกรายการ');
    textEl.focus();
    return;
  }
  if (!Number.isFinite(amount) || amount <= 0) {
    alert('กรุณากรอกจำนวนเงินให้ถูกต้อง (มากกว่า 0)');
    amountEl.focus();
    return;
  }

  const data = readCurrentData();
  const existing = data.transactions[editIndex];
  if (!existing) { cancelEdit(); return; }
  existing.text = text;
  existing.category = document.getElementById('category').value;
  existing.amount = amount;
  existing.type = type;
  saveCurrentData(data);
  cancelEdit();
  loadData();
}

function deleteTransaction(index) {
  if (!confirm('ลบรายการนี้ใช่หรือไม่?')) return;
  const data = readCurrentData();
  data.transactions.splice(index, 1);
  saveCurrentData(data);
  if (editIndex === index) cancelEdit();
  loadData();
}

function exportData() {
  const dataStr = localStorage.getItem(getStorageKey()) || JSON.stringify({ transactions: [] });
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `data_${currentYear}_month_${monthSelector.value}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function triggerImport() {
  document.getElementById('import-file').click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try {
      parsed = JSON.parse(reader.result);
    } catch (e) {
      alert('ไฟล์ไม่ถูกต้อง ไม่สามารถอ่านเป็น JSON ได้');
      return;
    }
    if (!parsed || !Array.isArray(parsed.transactions)) {
      alert('รูปแบบข้อมูลไม่ถูกต้อง');
      return;
    }
    if (!confirm('การนำเข้าจะเขียนทับข้อมูลของเดือนนี้ (' + monthSelector.options[monthSelector.selectedIndex].text + ' ' + currentYear + ') ใช่หรือไม่?')) return;
    const safeData = {
      transactions: parsed.transactions.filter(t => t && typeof t.text === 'string' && Number.isFinite(t.amount))
    };
    saveCurrentData(safeData);
    loadData();
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearData() {
  if (confirm('คุณต้องการลบข้อมูลทั้งหมดในเดือนนี้ใช่หรือไม่?')) {
    localStorage.removeItem(getStorageKey());
    cancelEdit();
    loadData();
  }
}

function fmt(n) {
  const abs = Math.abs(n);
  return (n < 0 ? '-' : '') + '฿' + abs.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function render(data) {
  let totalIncome = 0, totalExpense = 0;
  const catTotals = {};

  data.transactions.forEach(t => {
    const amt = Number.isFinite(t.amount) ? t.amount : 0; // heal any pre-existing corrupted (null) amount
    if (t.type === 'income') {
      totalIncome += amt;
    } else {
      totalExpense += amt;
      const cat = t.category || 'อื่นๆ';
      catTotals[cat] = (catTotals[cat] || 0) + amt;
    }
  });

  // Transaction list — newest first, original index preserved for edit/delete
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('tx-count').textContent = data.transactions.length ? `${data.transactions.length} รายการ` : '';

  if (!data.transactions.length) {
    list.innerHTML = `<li class="empty-li">
      <span class="empty-icon">📭</span>
      <div class="empty-txt">ยังไม่มีรายการในเดือนนี้</div>
    </li>`;
  } else {
    const indexed = data.transactions.map((t, i) => ({ t, i })).reverse();
    indexed.forEach(({ t, i }) => {
      const ico = CAT_ICO[t.category] || '📦';
      const safeAmt = Number.isFinite(t.amount) ? t.amount : 0; // heal any pre-existing corrupted (null) amount
      const amtStr = safeAmt.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      const li = document.createElement('li');
      li.className = 'tx-row';
      li.onclick = (e) => { if (!e.target.closest('.del-btn')) startEdit(i); };
      li.innerHTML = `
        <div class="tx-info">
          <div class="tx-top">
            <span class="tx-name">${escapeHtml(t.text)}</span>
            <span class="tx-badge">${ico} ${escapeHtml(t.category || '')}</span>
          </div>
          <div class="tx-date">${escapeHtml(t.date || '')}</div>
        </div>
        <div class="tx-side">
          <span class="tx-amt ${t.type === 'income' ? 'inc' : 'exp'}">
            ${t.type === 'income' ? '+' : '−'}฿${amtStr}
          </span>
          <button onclick="deleteTransaction(${i})" class="del-btn" aria-label="ลบ">✕</button>
        </div>`;
      list.appendChild(li);
    });
  }

  // Stats cards
  document.getElementById('stat-income').textContent = fmt(totalIncome);
  document.getElementById('stat-expense').textContent = fmt(totalExpense);
  const bal = totalIncome - totalExpense;
  const balEl = document.getElementById('stat-balance');
  balEl.textContent = fmt(bal);
  balEl.style.color = bal < 0 ? 'var(--text-danger)' : 'var(--text-accent)';

  // Budget bar — budget is always equal to total income for this month
  const budget = totalIncome;
  const pct = budget > 0 ? (totalExpense / budget) * 100 : 0;
  const clamped = Math.min(pct, 100);
  document.getElementById('budget-percent').innerText = Math.round(pct) + '%' + (budget > 0 ? ` (฿${budget.toLocaleString('th-TH')})` : ' (ยังไม่มีรายรับ)');
  const pb = document.getElementById('progress-bar');
  pb.style.width = clamped + '%';
  pb.style.background = pct >= 90 ? 'var(--fill-danger)' : pct >= 70 ? 'var(--fill-warning)' : 'var(--fill-accent)';

  // Ring arc
  const arc = document.getElementById('ring-arc');
  arc.style.strokeDashoffset = CIRC * (1 - clamped / 100);
  document.getElementById('ring-pct-display').textContent = Math.round(pct) + '%';
  arc.classList.remove('warn', 'over');
  if (pct >= 90) arc.classList.add('over');
  else if (pct >= 70) arc.classList.add('warn');

  // Category breakdown (expenses only, sorted highest first)
  const catSec = document.getElementById('cat-breakdown');
  const entries = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  if (!entries.length) {
    catSec.innerHTML = '<div class="cat-empty">ยังไม่มีรายจ่ายในเดือนนี้</div>';
  } else {
    const maxVal = entries[0][1];
    catSec.innerHTML = entries.map(([cat, val]) => {
      const ico = CAT_ICO[cat] || '📦';
      const width = maxVal > 0 ? Math.max((val / maxVal) * 100, 4) : 0;
      return `<div class="cat-row">
        <span class="cat-ico">${ico}</span>
        <span class="cat-name">${escapeHtml(cat)}</span>
        <div class="cat-track"><div class="cat-fill" style="width:${width}%"></div></div>
        <span class="cat-amt">฿${val.toLocaleString('th-TH', { maximumFractionDigits: 0 })}</span>
      </div>`;
    }).join('');
  }
}

loadData();
</script>
</body>
</html>
